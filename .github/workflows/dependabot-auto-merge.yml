name: Dependabot auto-merge

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Read Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: echo 'Major dependency updates remain manual for compatibility review.'

      - name: Wait for frontend quality check
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          for attempt in {1..60}; do
            check_state="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/check-runs?per_page=100" \
              --jq '[.check_runs[] | select(.app.slug == "github-actions" and (.name == "Frontend" or .name == "frontend"))] | sort_by(.started_at) | last | if . == null then "missing" else (.status + ":" + (.conclusion // "")) end')"

            case "${check_state}" in
              completed:success)
                exit 0
                ;;
              completed:*)
                echo "Frontend quality check failed: ${check_state}" >&2
                exit 1
                ;;
            esac

            echo "Waiting for Frontend quality check (${check_state})."
            sleep 10
          done

          echo 'Timed out waiting for the Frontend quality check.' >&2
          exit 1

      - name: Enable auto-merge
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "${PR_URL}" --auto --squash --delete-branch
