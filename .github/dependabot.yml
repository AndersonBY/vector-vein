version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: daily
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      frontend-security:
        applies-to: security-updates
        patterns:
          - "*"
      frontend-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
